services:
  web:
    build:
      context: ./
      dockerfile: ./.docker/Dockerfile.dev
    volumes:
      - './.env:/var/www/html/.env'
      - .:/app
      - caddy_data:/data
      - caddy_config:/config
    tty: true
    ports:
      - '80:80'
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge

volumes:
  sail-mysql:
  caddy_data:
  caddy_config: